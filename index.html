<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kyoko.nn // bio core</title>

<style>
/* --- BASE & CYBER ENVIRONMENT --- */
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    background:
    linear-gradient(rgba(0, 0, 0, 0.90), rgba(0, 0, 0, 0.90)),
    url("https://community.steamstatic.com/economy/image/a0b44yVZG6xneuQqGEgxNyzAxlmouy8Ipo0bUlJjRDfF9dQS1eD3AHU-t8xnioHyGdqSZpgsmMIM6FMBcQKdVqohuARmjx8NnHONY8y5FqaW_Tut-YpXEfDYsreg38Ky_HBQi5NxO48cccut4_1icZRE4g");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    font-family: 'Consolas', 'Courier New', monospace;
    color: #00bb9c;
    padding: 40px 20px;
}

/* --- CRT SCANLINE EFFECT --- */
body::before {
    content: " ";
    display: block;
    position: fixed;
    top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
    z-index: 99999;
    background-size: 100% 4px, 6px 100%;
    pointer-events: none;
}

.bio-container {
    width: 100%;
    max-width: 450px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* --- HEADER PERFIL --- */
.profile-header {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 5px;
}

.avatar-wrapper {
    position: relative;
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 2px solid #de007a;
    box-shadow: 0 0 15px rgba(222, 0, 122, 0.5);
    padding: 4px;
    background: rgba(0,0,0,0.6);
}

.avatar-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
}

.username {
    font-size: 1.25rem;
    font-weight: bold;
    color: #00bb9c;
    text-shadow: 0 0 8px rgba(0, 187, 156, 0.5);
    letter-spacing: 2px;
}

/* --- INTRO TERMINAL --- */
.intro-terminal {
    background: rgba(3, 8, 8, 0.85);
    border: 1px solid rgba(0, 187, 156, 0.2);
    border-radius: 4px;
    padding: 14px 18px;
    font-size: 0.85rem;
    line-height: 1.5;
    box-shadow: inset 0 0 15px rgba(0, 187, 156, 0.05);
}

/* --- PILA DE ENLACES CON SUPERPOSICIÓN --- */
.links-wrapper {
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
}

/* DISEÑO CYBERPUNK HUD CON SUBTEXTOS */
.hud-btn {
    width: 100%;
    padding: 14px 20px;
    background: rgba(0, 14, 11, 0.6);
    border: 1px solid rgba(0, 187, 156, 0.3);
    border-left: 4px solid #00bb9c;
    color: #00bb9c;
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
    user-select: none;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
    box-shadow: inset 0 0 10px rgba(0, 187, 156, 0.05);
    transition: all 0.2s ease-out;
}

/* Pequeña etiqueta técnica de superposición */
.hud-btn::before {
    content: "SYS_SRC // LN_";
    position: absolute;
    top: 4px;
    right: 8px;
    font-size: 0.55rem;
    color: rgba(0, 187, 156, 0.35);
    font-weight: normal;
}

.btn-subtext {
    font-size: 0.65rem;
    color: rgba(0, 187, 156, 0.5);
    font-weight: normal;
    letter-spacing: 1px;
}

/* Efectos Hover Generales */
.hud-btn:hover:not(.hacked-link):not(.copied-state) {
    background: rgba(0, 187, 156, 0.1);
    border-color: #00bb9c;
    box-shadow: 0 0 15px rgba(0, 187, 156, 0.25), inset 0 0 10px rgba(0, 187, 156, 0.1);
    transform: translateX(4px);
}

/* Spotify Custom */
.spotify-btn {
    border-color: rgba(0, 255, 102, 0.3);
    border-left: 4px solid #00ff66;
    color: #00ff66;
}
.spotify-btn .btn-subtext { color: rgba(0, 255, 102, 0.5); }
.spotify-btn::before { color: rgba(0, 255, 102, 0.3); content: "SYS_SRC // AUD_"; }
.spotify-btn:hover {
    background: rgba(0, 255, 102, 0.08);
    border-color: #00ff66;
    box-shadow: 0 0 15px rgba(0, 255, 102, 0.2);
    transform: translateX(4px);
}

/* Discord Custom */
.discord-btn { border-left-color: #00bb9c; }
.discord-btn.copied-state {
    background: rgba(0, 255, 102, 0.1) !important;
    color: #00ff66 !important;
    border-color: #00ff66 !important;
    border-left-color: #00ff66 !important;
    box-shadow: 0 0 12px rgba(0, 255, 102, 0.2) !important;
}
.discord-btn.copied-state .btn-subtext { color: #00ff66 !important; }

/* --- HUD BARRA DE CARGA --- */
.hud-bar-wrapper {
    width: 100%;
    padding: 8px 4px;
    transition: all 0.4s ease;
}

/* Animación de hackeo/glitch para desaparecer */
.hud-bar-wrapper.glitch-fadeout {
    animation: glitch-destroy 0.35s steps(2) forwards;
    pointer-events: none;
}

.hud-bar-label {
    font-size: 0.7rem;
    letter-spacing: 2px;
    margin-bottom: 6px;
    font-weight: bold;
}
.hud-bar-container {
    border: 1px solid rgba(0, 187, 156, 0.4);
    padding: 2px;
    height: 16px;
    background: rgba(0, 12, 10, 0.6);
}
.hud-bar-fill {
    height: 100%;
    width: 0%;
    background: #00bb9c;
    box-shadow: 0 0 8px #00bb9c;
    transition: width 0.06s linear;
}

/* --- AMBIENT CORRUPTED LINKS (Instagram & Twitch) --- */
.hacked-link {
    color: #ff003c !important;
    border-color: rgba(255, 0, 60, 0.3);
    border-left: 4px solid #ff003c;
    text-shadow: 0 0 4px rgba(255, 0, 60, 0.3);
    animation: soft-shake 0.4s infinite alternate;
}
.hacked-link .btn-subtext { color: rgba(255, 0, 60, 0.5); }
.hacked-link::before { color: rgba(255, 0, 60, 0.3); content: "SYS_ERR // WRN_"; }

.hacked-link:hover {
    background: rgba(255, 0, 60, 0.08) !important;
    border-color: #ff003c !important;
    box-shadow: 0 0 15px rgba(255, 0, 60, 0.3) !important;
    transform: translateX(4px);
}

/* --- ARCHIVO LOCAL EXTRA --- */
.cyber-folder-item {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 10px;
    border: 1px dashed rgba(0, 187, 156, 0.2);
    background: rgba(0, 8, 6, 0.3);
    font-size: 0.8rem;
    cursor: pointer;
    user-select: none;
    transition: all 0.2s;
}
.cyber-folder-item.selected {
    background: rgba(0, 187, 156, 0.1);
    border-style: solid;
    border-color: #00bb9c;
}

/* --- PARTÍCULAS --- */
.glitch-particle {
    position: fixed; pointer-events: none; color: #ff003c; font-family: monospace;
    font-weight: bold; z-index: 10000; white-space: nowrap; opacity: 1;
}

/* --- UTILS --- */
.pink { color: #de007a; text-shadow: 0 0 8px #de007a; }
.yellow { color: #ffcc00; text-shadow: 0 0 8px #ffcc00; }
.green { color: #00ff66; text-shadow: 0 0 8px #00ff66; }
.cursor { animation: cursor-blink .8s infinite; }

/* --- ANIMACIONES --- */
@keyframes cursor-blink { 50% { opacity: 0; } }
@keyframes soft-shake {
    0% { transform: translateX(0); }
    100% { transform: translateX(1px); }
}

@keyframes glitch-destroy {
    0% { transform: scaleY(1) skewX(0deg); opacity: 1; }
    30% { transform: scaleY(0.4) skewX(20deg); opacity: 0.8; background: #ff003c; color: #000; }
    60% { transform: scaleY(1.2) skewX(-10deg); opacity: 0.4; }
    90% { transform: scaleY(0.02); opacity: 0.1; }
    100% { transform: scaleY(0); opacity: 0; height: 0; padding: 0; margin: 0; }
}
</style>
</head>
<body>

<div class="bio-container">
    
    <!-- HEADER PERFIL -->
    <div class="profile-header">
        <div class="avatar-wrapper">
            <img src="Proyecto nuevo (1).jpg" alt="Kyoko Avatar">
        </div>
        <div class="username">kyoko.nn</div>
    </div>

    <!-- TERMINAL COMPACTA DE INICIO -->
    <div class="intro-terminal">
        <div id="terminal"></div>
    </div>

    <!-- CAPA CONECTADA DE ENLACES -->
    <div class="links-wrapper">
        
        <!-- === LA BARRA SE MUESTRA PRIMERO QUE TODO === -->
        <div class="hud-bar-wrapper" id="dynamic-loader" style="display: none;">
            <div class="hud-bar-label yellow" id="hud-label">DECRYPTING_SECURE_NODES: 0%</div>
            <div class="hud-bar-container"><div class="hud-bar-fill" id="hud-fill"></div></div>
        </div>

        <!-- 1. Spotify (Oculto al inicio) -->
        <a href="https://open.spotify.com/user/kkf7mp2yfo34l5gfshg4i9vs3?si=7a5c1b5d30a24bdd" target="_blank" class="hud-btn spotify-btn" id="spotify-btn" style="display: none;">
            <span>SPOTIFY</span>
            <span class="btn-subtext">PLAYLISTS_TUNED_ACTIVE</span>
        </a>
        
        <!-- 2. Discord (Oculto al inicio) -->
        <div class="hud-btn discord-btn" id="discord-btn" style="display: none;">
            <span>DISCORD</span>
            <span class="btn-subtext" id="discord-sub">COPY_NETWORK_ID</span>
        </div>

        <!-- 3. Instagram (Oculto al inicio) -->
        <a href="#" class="hud-btn hacked-link" id="insta-btn" style="display: none;">
            <span>INSTAGRAM</span>
            <span class="btn-subtext">NODE_LINK_CORRUPTED</span>
        </a>
        
        <!-- 4. Twitch (Oculto al inicio) -->
        <a href="#" class="hud-btn hacked-link" id="twitch-btn" style="display: none;">
            <span>TWITCH</span>
            <span class="btn-subtext">STREAM_FEED_OFFLINE</span>
        </a>

        <!-- Carpeta Opcional -->
        <div class="cyber-folder-item" id="system-folder" style="display: none;">
            <span class="pink">[ 📁 ]</span> classified_files.tar
        </div>
    </div>

</div>

<script>
const terminal = document.getElementById('terminal');
const loaderWrapper = document.getElementById('dynamic-loader');
const hudLabel = document.getElementById('hud-label');
const hudFill = document.getElementById('hud-fill');

const spotifyBtn = document.getElementById('spotify-btn');
const discordBtn = document.getElementById('discord-btn');
const instaBtn = document.getElementById('insta-btn');
const twitchBtn = document.getElementById('twitch-btn');
const systemFolder = document.getElementById('system-folder');

const wait = ms => new Promise(res => setTimeout(res, ms));

function typeLine(text, parentElement, speed = 15) {
    return new Promise((resolve) => {
        let index = 0; const textNode = document.createElement('span'); const cursorNode = document.createElement('span');
        cursorNode.className = 'cursor'; cursorNode.innerHTML = '█';
        parentElement.appendChild(textNode); parentElement.appendChild(cursorNode);
        function write() {
            if (index < text.length) {
                textNode.innerHTML += text.charAt(index); index++; setTimeout(write, speed);
            } else { cursorNode.remove(); resolve(); }
        }
        write();
    });
}

// SECUENCIA CORREGIDA DE CARGA COMPLETA
async function runBioSequence() {
    // 1. CARGA DE TEXTOS DE DIAGNÓSTICO
    const l1 = document.createElement('div'); l1.innerHTML = '<span class="pink">[ SYS ]</span> '; terminal.appendChild(l1);
    await typeLine('initializing bio_OS protocols...', l1);
    await wait(200);
    
    const l2 = document.createElement('div'); l2.innerHTML = '<span class="pink">[ NET ]</span> '; terminal.appendChild(l2);
    await typeLine('establishing sync... <span class="green">READY</span>', l2);
    await wait(300);

    // 2. APARECE LA BARRA SOLA EN EL MEDIO Y EMPIEZA A CARGAR
    loaderWrapper.style.display = 'block';
    for (let p = 0; p <= 100; p += 5) {
        hudFill.style.width = `${p}%`;
        hudLabel.innerText = `DECRYPTING_SECURE_NODES: ${p}%`;
        await wait(25);
    }
    
    hudLabel.className = 'hud-bar-label green';
    hudLabel.innerText = `NODES_DECRYPTED // ACCESS_OK`;
    await wait(300);

    // 3. EFECTO HACKEO: Animación destructiva para borrar la barra
    loaderWrapper.classList.add('glitch-fadeout');
    await wait(350);
    loaderWrapper.remove(); // Se elimina del flujo visual

    // 4. REVELACIÓN SIMULTÁNEA DE TODAS LAS REDES CON EL ORDEN ASIGNADO
    spotifyBtn.style.display = 'flex';
    discordBtn.style.display = 'flex';
    instaBtn.style.display = 'flex';
    twitchBtn.style.display = 'flex';
    systemFolder.style.display = 'flex';

    setupInteractions();
}

/* --- ENGINE DE PARTÍCULAS --- */
let activeParticles = [];
const cyberGlitches = ['█', '■', '01', 'ERR', '░', '§'];

function spawnPhysicalParticle(x, y, isClick = false) {
    const particle = document.createElement('span');
    particle.className = 'glitch-particle';
    particle.innerText = cyberGlitches[Math.floor(Math.random() * cyberGlitches.length)];
    if(isClick) {
        particle.style.textShadow = '0 0 8px #ff003c';
    } else {
        particle.style.fontSize = '0.55rem';
        particle.style.opacity = '0.6';
    }
    document.body.appendChild(particle);

    let vx = isClick ? (Math.random() - 0.5) * 5 : (Math.random() - 0.5) * 2;
    let vy = isClick ? (Math.random() - 0.5) * 5 : -(Math.random() * 1.2 + 0.8);
    let gravity = isClick ? 0.12 : -0.01;
    const lifespan = 450;
    const startTime = performance.now();

    activeParticles.push({ element: particle, x: x, y: y, vx: vx, vy: vy, gravity: gravity, startTime: startTime, lifespan: lifespan });
}

function updateParticles(timestamp) {
    for (let i = activeParticles.length - 1; i >= 0; i--) {
        let p = activeParticles[i]; let elapsed = timestamp - p.startTime;
        if (elapsed >= p.lifespan) { p.element.remove(); activeParticles.splice(i, 1); continue; }
        p.vy += p.gravity; p.x += p.vx; p.y += p.vy;
        p.element.style.left = `${p.x}px`; p.element.style.top = `${p.y}px`;
        p.element.style.opacity = 1 - (elapsed / p.lifespan);
    }
    requestAnimationFrame(updateParticles);
}
requestAnimationFrame(updateParticles);

function setupInteractions() {
    // Configuración Copiar Discord
    const discordSub = document.getElementById('discord-sub');
    discordBtn.addEventListener('click', async () => {
        try {
            await navigator.clipboard.writeText('kyoko.nn');
            discordBtn.classList.add('copied-state');
            discordBtn.querySelector('span').innerText = '[ COPIED! ]';
            discordSub.innerText = 'USER_ID_SAVED_TO_CLIPBOARD';
            setTimeout(() => {
                discordBtn.classList.remove('copied-state');
                discordBtn.querySelector('span').innerText = 'DISCORD';
                discordSub.innerText = 'COPY_NETWORK_ID';
            }, 1300);
        } catch (err) { console.error(err); }
    });

    // Partículas interactivas en botones inestables (Instagram y Twitch)
    const hackedLinks = document.querySelectorAll('.hacked-link');
    hackedLinks.forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            for(let k=0; k<12; k++) spawnPhysicalParticle(e.clientX, e.clientY, true);
        });
        btn.addEventListener('mousemove', (e) => {
            if(Math.random() > 0.78) spawnPhysicalParticle(e.clientX, e.clientY, false);
        });
    });

    // Carpeta secreta Easter Egg
    const folder = document.getElementById('system-folder');
    folder.addEventListener('click', (e) => { e.stopPropagation(); folder.classList.add('selected'); });
    document.addEventListener('click', () => { folder.classList.remove('selected'); });
    folder.addEventListener('dblclick', () => { window.open('https://www.youtube.com/watch?v=dQw4w9WgXcQ', '_blank'); });
}

runBioSequence();
</script>

</body>
